version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/shopswift
      - JWT_SECRET=change-me
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:8080
    ports:
      - "4000:4000"
    depends_on:
      - mongo

volumes:
  mongo_data:
